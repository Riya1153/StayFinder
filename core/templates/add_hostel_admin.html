<!DOCTYPE html>
<html>
<head>
<title>Add Hostel</title>
<style>
body{background:#f4f6f8;font-family:Segoe UI,sans-serif;display:flex;justify-content:center;align-items:center;min-height:100vh;}
.box{background:white;width:420px;padding:30px;border-radius:14px;box-shadow:0 8px 25px rgba(0,0,0,0.08);}
h2{text-align:center;margin-bottom:20px;}
input{width:100%;padding:12px;margin-bottom:12px;border:1px solid #ddd;border-radius:8px;}
button{width:100%;padding:13px;background:#16a34a;color:white;border:none;border-radius:8px;font-weight:bold;}
</style>
</head>
<body>

<div class="box">
<h2>Add {{ hostel_type }}</h2>

<form method="POST">
{% csrf_token %}

<input type="text" name="title" placeholder="Hostel Title" required>
<input type="text" name="location" placeholder="Location" required>
<input type="number" name="price" placeholder="Price Per Month" required>
<input type="number" name="stars" placeholder="Stars" value="5" required>

<input type="text" name="owner_name" placeholder="Owner Name" required>
<input type="text" name="owner_phone" placeholder="Owner Phone" required>
<input type="email" name="owner_email" placeholder="Owner Email" required>

<button type="submit">Save Hostel</button>
</form>
</div>

</body>
</html>
