<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StayFinder - Personal Dashboard</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #FFDADA;
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px 0;
        }
        .dashboard-card {
            background-color: white;
            width: 360px;
            padding: 25px;
            border-radius: 25px;
            text-align: center;
            box-shadow: 0px 4px 15px rgba(0, 0, 0, 0.1);
        }
        .header-box {
            background-color: #D9D9D9;
            padding: 12px;
            font-weight: bold;
            font-size: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            text-transform: uppercase;
        }
        .circle {
            width: 90px;
            height: 90px;
            background-color: #D9D9D9;
            border-radius: 50%;
            display: inline-block;
            margin-bottom: 10px;
            border: 1px solid #ccc;
        }
        .set-pic-btn {
            background-color: #61FFEA;
            border: none;
            padding: 8px 18px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 20px;
        }
        .info-list {
            text-align: left;
        }
        .label-text {
            font-size: 12px;
            font-weight: bold;
            margin-bottom: 4px;
            margin-left: 5px;
            display: block;
            text-transform: uppercase;
        }
        .info-item {
            background-color: #F3F3F3;
            padding: 10px 15px;
            margin-bottom: 15px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            text-decoration: none;
            color: inherit;
        }
        .info-content {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
            font-weight: bold;
        }
        .material-icons {
            font-size: 20px;
            color: #555;
        }
        input.info-input {
            border: none;
            background: transparent;
            font-weight: bold;
            width: 100%;
            font-family: inherit;
            outline: none;
        }

        /* New Action Buttons */
        .action-btns {
            display: flex;
            flex-direction: column;
            gap: 10px;
            align-items: center;
            margin-top: 10px;
        }
        .search-btn {
            background-color: #9370DB; /* Purple from your front page */
            color: white;
            padding: 12px;
            border-radius: 10px;
            font-weight: bold;
            text-decoration: none;
            width: 100%;
            display: block;
            border: 1px solid #000;
        }
        .logout-btn {
            background-color: #B2B2FF;
            color: black;
            border: none;
            padding: 12px;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            text-decoration: none;
            display: block;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="dashboard-card">
        <div class="header-box">PERSONAL DASHBOARD</div>

        <div class="circle"></div><br>
        <button class="set-pic-btn">SET PICTURE</button>

        <div class="info-list">
            <label class="label-text">NAME</label>
            <div class="info-item">
                <input type="text" class="info-input" placeholder="REDITA">
                <span class="material-icons">chevron_right</span>
            </div>

            <label class="label-text">CONTACT NUMBER</label>
            <div class="info-item">
                <input type="text" class="info-input" placeholder="01XXXXXXXXX">
                <span class="material-icons">chevron_right</span>
            </div>

            <label class="label-text">HOME ADDRESS</label>
            <div class="info-item">
                <input type="text" class="info-input" placeholder="DHAKA, BANGLADESH">
                <span class="material-icons">chevron_right</span>
            </div>

            <label class="label-text">LANGUAGE</label>
            <div class="info-item">
                <input type="text" class="info-input" placeholder="ENGLISH / BANGLA">
                <span class="material-icons">chevron_right</span>
            </div>

            <a href="#" class="info-item" style="margin-top: 25px;">
                <div class="info-content">
                    <span class="material-icons">favorite_border</span> FAVORITES
                </div>
                <span class="material-icons">chevron_right</span>
            </a>

            <a href="#" class="info-item">
                <div class="info-content">
                    <span class="material-icons">star_border</span> STARRED
                </div>
                <span class="material-icons">chevron_right</span>
            </a>
        </div>

        <div class="action-btns">
            <a href="{% url 'hostel_list' %}" class="search-btn">SEARCH HOUSE & HOSTELS</a>

            <a href="{% url 'front_page' %}" class="logout-btn">LOG OUT</a>
        </div>
    </div>

</body>
</html>
