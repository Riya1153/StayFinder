{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StayFinder Dashboard</title>
    <style>
        /* Keeping your existing styles */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #fdf0e6; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .container { display: flex; background: white; border-radius: 30px; box-shadow: 0 15px 40px rgba(0,0,0,0.08); width: 100%; max-width: 1150px; height: 85vh; min-height: 650px; overflow: hidden; }
        .dashboard-card { flex: 1; padding: 35px; min-width: 400px; display: flex; flex-direction: column; background: white; z-index: 2; overflow-y: auto; }
        .header { background: #fff5eb; color: #b07d62; padding: 12px; text-align: center; border-radius: 10px; font-weight: 800; margin-bottom: 18px; font-size: 14px; letter-spacing: 1px; text-transform: uppercase; }

        /* Profile Section Styling */
        .profile-section { text-align: center; margin-bottom: 20px; }
        .profile-section img { width: 95px; height: 95px; border-radius: 50%; object-fit: cover; border: 3px solid #fff; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .set-picture-btn { background: #e69150; border: none; padding: 8px 20px; margin-top: 10px; border-radius: 8px; color: white; font-weight: bold; font-size: 12px; cursor: pointer; }

        /* Form Styling */
        label { font-size: 11px; font-weight: 800; color: #444; margin-top: 12px; display: block; text-transform: uppercase; }
        input { width: 100%; background: #f8f8f8; padding: 12px; border-radius: 10px; margin-top: 5px; border: 1px solid #eee; outline: none; font-size: 14px; color: #333; }
        .save-btn { width: 100%; margin-top: 25px; padding: 15px; background: #e69150; border: none; border-radius: 12px; color: white; font-weight: bold; font-size: 16px; cursor: pointer; text-transform: uppercase; }

        .right-side { flex: 1.8; }
        .right-side img { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>

<div class="container">
    <div class="dashboard-card">
        <div class="header">Personal Dashboard</div>

        {% if show_admin_btn %}
        <div style="margin-bottom: 20px;">
            <a href="{% url 'admin_dashboard' %}"
               style="background-color: #6a1b9a; color: white; padding: 15px; display: block; text-align: center; text-decoration: none; border-radius: 12px; font-weight: bold; text-transform: uppercase; font-size: 14px;">
                ADMIN DASHBOARD
            </a>
        </div>
        {% endif %}

        <div class="profile-section">
            <img id="preview" src="{{ user_data.profile_pic.url|default:'/static/images/arkam.png' }}" alt="Profile">
            <br>
            <input type="file" id="upload" name="profile_image" hidden accept="image/*">
            <button type="button" class="set-picture-btn" onclick="document.getElementById('upload').click()">SET PICTURE</button>
        </div>

        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}

            <label>NAME</label>
            <input type="text" name="full_name" placeholder="Enter Your Name" value="{{ user_data.name|default:'' }}">

            <label>EMAIL</label>
            <input type="email" name="email" value="{{ request.user.email }}" readonly>

            <label>CONTACT NUMBER</label>
            <input type="text" name="phone" placeholder="01XXXXXXXXX" value="{{ user_data.phone|default:'' }}">

            <button type="submit" class="save-btn">SAVE</button>
        </form>
    </div>

    <div class="right-side">
        <img src="{% static 'images/dashboard.png' %}" alt="Interior View">
    </div>
</div>

<script>
    // Preview image before upload
    document.getElementById("upload").onchange = function(event) {
        let reader = new FileReader();
        reader.onload = function() {
            document.getElementById("preview").src = reader.result;
        }
        if (event.target.files[0]) {
            reader.readAsDataURL(event.target.files[0]);
        }
    };
</script>

</body>
</html>
