{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StayFinder Dashboard</title>

    <style>
        /* CSS stays exactly the same as your previous version */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #fdf0e6; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .container { display: flex; background: white; border-radius: 30px; box-shadow: 0 15px 40px rgba(0,0,0,0.08); width: 100%; max-width: 1150px; height: 85vh; min-height: 650px; overflow: hidden; }
        .dashboard-card { flex: 1; padding: 40px; min-width: 400px; display: flex; flex-direction: column; justify-content: center; background: white; z-index: 2; }
        .header { background: #fff5eb; color: #b07d62; padding: 12px; text-align: center; border-radius: 10px; font-weight: 800; margin-bottom: 20px; font-size: 14px; letter-spacing: 1px; }
        .profile { text-align: center; margin-bottom: 20px; }
        .profile img { width: 100px; height: 100px; border-radius: 50%; object-fit: cover; border: 3px solid #fff; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .profile button { background: #e69150; border: none; padding: 8px 20px; margin-top: 10px; border-radius: 8px; color: white; font-weight: bold; font-size: 12px; cursor: pointer; transition: 0.3s; }
        .label { font-size: 11px; font-weight: 800; color: #444; margin-top: 15px; display: block; text-transform: uppercase; }
        .input-box { background: #f8f8f8; padding: 12px; border-radius: 10px; margin-top: 5px; border: 1px solid #eee; }
        .input-box input { width: 100%; border: none; background: transparent; outline: none; font-size: 14px; color: #333; }
        .save-btn { width: 100%; margin-top: 30px; padding: 15px; background: #e69150; border: none; border-radius: 12px; color: white; font-weight: bold; font-size: 16px; cursor: pointer; box-shadow: 0 4px 15px rgba(230, 145, 80, 0.3); transition: 0.3s; text-transform: uppercase; }
        .save-btn:hover { background: #d47a3a; transform: translateY(-2px); }
        .right-side { flex: 1.8; position: relative; }
        .right-side img { width: 100%; height: 100%; object-fit: cover; display: block; }
        @media (max-width: 950px) { .container { flex-direction: column; height: auto; } .right-side { height: 350px; order: -1; } .dashboard-card { min-width: 100%; } }
    </style>
</head>

<body>

<div class="container">
    <div class="dashboard-card">
        <div class="header">PERSONAL DASHBOARD</div>

        <form method="POST" enctype="multipart/form-data" action=".">
            {% csrf_token %}

            <div class="profile">
                <img id="preview" src="{% static 'images/arkam.png' %}" alt="profile">
                <br>
                <input type="file" id="upload" name="profile_image" hidden accept="image/*">
                <button type="button" onclick="document.getElementById('upload').click()">SET PICTURE</button>
            </div>

            <label class="label">Name</label>
            <div class="input-box">
                <input type="text" name="full_name" placeholder="Enter Your Name" required>
            </div>

            <label class="label">Email</label>
            <div class="input-box">
                <input type="email" name="email" placeholder="abc@example.com" required>
            </div>

            <label class="label">Contact Number</label>
            <div class="input-box">
                <input type="text" name="phone" placeholder="01XXXXXXXXX">
            </div>

            <label class="label">Home Address</label>
            <div class="input-box">
                <input type="text" name="address" placeholder="Current Address">
            </div>

            <label class="label">Language</label>
            <div class="input-box">
                <input type="text" name="language" placeholder="ENGLISH / BANGLA">
            </div>

            <button type="submit" class="save-btn">SAVE</button>
        </form>
    </div>

    <div class="right-side">
        <img src="{% static 'images/dashboard.png' %}" alt="Interior View">
    </div>
</div>

<script>
    // Image preview logic remains same
    document.getElementById("upload").onchange = function(event) {
        let reader = new FileReader();
        reader.onload = function() {
            document.getElementById("preview").src = reader.result;
        }
        if (event.target.files[0]) {
            reader.readAsDataURL(event.target.files[0]);
        }
    };
</script>

</body>
</html>
