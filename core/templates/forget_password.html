<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StayFinder - Reset Password</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Times New Roman', serif;
        }

        body {
            background-color: #fdf4f4;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .main-container {
            width: 100%;
            max-width: 1300px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 50px;
        }

        .left-side {
            flex: 1;
            max-width: 550px;
        }

        .banner {
            background-color: #6a1b9a;
            padding: 18px;
            text-align: center;
            margin-bottom: 35px;
        }

        .banner h1 {
            color: #d4d94d;
            font-size: 38px;
            font-weight: bold;
        }

        .title {
            font-size: 48px;
            font-weight: bold;
            margin-bottom: 12px;
        }

        .subtitle {
            font-size: 16px;
            margin-bottom: 35px;
        }

        .form-box {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        input {
            padding: 18px;
            border: none;
            background: #d9d9d9;
            font-size: 18px;
            width: 100%;
            text-align: center;
        }

        .or {
            text-align: center;
            font-weight: bold;
            font-size: 20px;
        }

        .btn {
            background-color: #59dcd0;
            padding: 14px;
            border: none;
            font-weight: bold;
            font-size: 18px;
            cursor: pointer;
            margin-top: 10px;
        }

        .btn:hover {
            opacity: 0.9;
        }

        .right-side {
            flex: 1;
            text-align: center;
        }

        .right-side img {
            max-width: 520px;
            width: 100%;
        }

        @media(max-width: 900px){
            .main-container{
                flex-direction: column;
                text-align: center;
            }

            .left-side{
                max-width: 100%;
            }

            .right-side img{
                margin-top: 30px;
            }
        }
    </style>
</head>

<body>

<div class="main-container">

    <div class="left-side">

        <div class="banner">
            <h1>HI! STAYS FINDER</h1>
        </div>

        <h2 class="title">RESET PASSWORD</h2>
        <p class="subtitle">Enter your email or phone to receive a reset code</p>

        <!-- FIXED FORM -->
        <form class="form-box" method="POST" action="{% url 'verify_code' %}">
            {% csrf_token %}

            <input type="text" name="phone" placeholder="ENTER MOBILE NUMBER">
            <div class="or">OR</div>
            <input type="email" name="email" placeholder="ENTER YOUR EMAIL">

            <!-- IMPORTANT: type submit -->
            <button type="submit" class="btn">CONTINUE</button>
        </form>

    </div>

    <div class="right-side">
        <img src="{% static 'images/home.png' %}" alt="StayFinder Image">
    </div>

</div>

</body>
</html>
