<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Forget Password - StayFinder</title>
    <style>
        body {
            background-color: #FFDADA; /* Tomar 2nd pic-er moto Peach/Pinkish background */
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .card {
            background-color: #FFFFFF;
            width: 350px;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0px 4px 15px rgba(0, 0, 0, 0.1);
        }

        .header-box {
            background-color: #D9D9D9;
            padding: 10px;
            font-weight: bold;
            font-size: 14px;
            margin-bottom: 10px;
            border-radius: 5px;
        }

        .sub-text {
            font-size: 11px;
            font-weight: bold;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 8px;
            background-color: #E8E8E8;
            box-sizing: border-box; /* Jate padding-e box boro na hoy */
            text-align: center;
        }

        .or-text {
            font-weight: bold;
            margin: 5px 0;
        }

        .btn-continue {
            background-color: #61FFEA; /* Turquoise blue button */
            border: none;
            padding: 10px 25px;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 15px;
        }

        .btn-submit {
            background-color: #B2B2FF; /* Purple/Blue button */
            border: none;
            padding: 12px 50px;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
        }

        p {
            font-size: 12px;
            margin: 10px 0;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="header-box">FORGET & CHANGING PASSWORD</div>
        <div class="sub-text">IF FORGET PASSWORD THEN FIND YOUR ACCOUNT</div>

        <input type="text" placeholder="ENTER MOBILE NUMBER">
        <div class="or-text">OR</div>
        <input type="email" placeholder="ENTER YOUR EMAIL">
        <button class="btn-continue">CONTINUE</button>

        <input type="text" placeholder="GET CODE VIA MESSAGE">
        <button class="btn-continue">CONTINUE</button>

        <input type="password" placeholder="CHANGE PASSWORD">
        <button class="btn-submit">SUBMIT</button>
    </div>

</body>
</html>
