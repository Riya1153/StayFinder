{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Forgot Password</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(to right,#f5f7fb,#eef1ff);
}

/* MAIN WRAPPER (IMPORTANT FIX) */
.container{
    width:90%;
    max-width:1100px;
    display:flex;
    align-items:center;
    justify-content:space-between;
}

/* LEFT */
.left{
    width:45%;
}

.card{
    background:#fff;
    padding:50px 40px;
    border-radius:20px;
    box-shadow:0 15px 40px rgba(0,0,0,0.08);
    text-align:center;
}

/* ICON */
.icon{
    width:70px;
    height:70px;
    margin:auto;
    border-radius:50%;
    background:#eef1ff;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:30px;
    margin-bottom:15px;
}

/* TEXT */
.card h2{
    font-size:32px;
    margin-bottom:10px;
}

.card p{
    color:#666;
    font-size:15px;
    margin-bottom:25px;
}

/* INPUT BOX FIX */
.input-box{
    position:relative;
    margin-bottom:15px;
}

.input-box input{
    width:100%;
    padding:14px 14px 14px 45px;
    border-radius:10px;
    border:1px solid #ddd;
    font-size:15px;
}

.input-box span{
    position:absolute;
    left:12px;
    top:50%;
    transform:translateY(-50%);
    font-size:18px;
}

/* BUTTON */
button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    background:linear-gradient(to right,#3b82f6,#9333ea);
    color:white;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
}

/* DIVIDER */
.divider{
    display:flex;
    align-items:center;
    margin:25px 0;
    color:#aaa;
    font-size:14px;
}

.divider::before,
.divider::after{
    content:'';
    flex:1;
    height:1px;
    background:#ddd;
}

.divider span{
    margin:0 10px;
}

/* BACK */
.back{
    color:#5a67d8;
    text-decoration:none;
    font-size:14px;
}

/* RIGHT */
.right{
    width:50%;
    display:flex;
    flex-direction:column;
    align-items:center;
}

.right img{
    width:90%;
}

.logo{
    margin-top:15px;
    font-size:28px;
    color:#6b5cff;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="container">

    <!-- LEFT -->
    <div class="left">
        <div class="card">

            <div class="icon">🔒</div>

            <h2>Forgot Password</h2>
            <p>Enter your email to receive a password reset link</p>

            <form method="post">
                {% csrf_token %}

                <!-- 🔥 FIXED INPUT -->
                <div class="input-box">
                    <span>📧</span>
                    <input type="email" name="email" placeholder="Enter your email address" required>
                </div>

                <button type="submit">✈ Send Reset Link</button>
            </form>

            <div class="divider"><span>or</span></div>

            <a href="/login/" class="back">← Back to Login</a>

        </div>
    </div>

    <!-- RIGHT -->
    <div class="right">
        <img src="{% static 'images/home.png' %}">
        <div class="logo">StayFinder</div>
    </div>

</div>

</body>
</html>
