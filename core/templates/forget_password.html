<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forget Password - StayFinder</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Times New Roman', serif;
        }
        body {
            background-color: #fdf4f4;
            min-height: 100vh;
        }

        .page-wrapper {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 24px 32px;
        }
        .top-left-box {
            align-self: flex-start;
            background: #d9d9d9;
            padding: 14px 42px;
            border: 1px solid #bcbcbc;
            font-weight: bold;
            font-size: 22px;
            text-transform: uppercase;
            margin-bottom: 30px;
        }
        .main-section {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 40px;
            width: 100%;
            max-width: 1500px;
            margin: 0 auto;
        }
        .form-side {
            flex: 1;
            max-width: 700px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .purple-banner {
            background-color: #6a1b9a;
            width: 100%;
            max-width: 700px;
            padding: 18px;
            text-align: center;
            margin-bottom: 35px;
        }
        .banner-text {
            color: #d4d94d;
            font-size: 42px;
            font-weight: bold;
            text-transform: uppercase;
        }
        .form-title {
            font-size: 42px;
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: 15px;
            text-align: center;
            line-height: 1.2;
        }
        .sub-text {
            font-size: 18px;
            font-weight: bold;
            text-align: center;
            margin-bottom: 30px;
        }
        .forget-form {
            width: 100%;
            max-width: 420px;
            display: flex;
            flex-direction: column;
            gap: 18px;
        }
        .input-box {
            background-color: #d9d9d9;
            border: none;
            outline: none;
            padding: 16px 18px;
            width: 100%;
            font-size: 18px;
            text-align: center;
        }
        .or-text {
            font-size: 28px;
            font-weight: bold;
            text-align: center;
        }
        .btn-continue {
            background-color: #61ffea;
            border: none;
            padding: 14px;
            font-weight: bold;
            font-size: 20px;
            cursor: pointer;
            width: 180px;
            margin: 0 auto;
        }
        .btn-submit {
            background-color: #b39ddb;
            border: none;
            padding: 16px;
            font-weight: bold;
            font-size: 22px;
            text-transform: uppercase;
            margin-top: 10px;
            cursor: pointer;
            color: black;
            width: 100%;
        }
        .image-side {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .image-side img {
            width: 100%;
            max-width: 650px;
            height: auto;
            object-fit: contain;
        }
        @media (max-width: 1100px) {
            .main-section {
                flex-direction: column-reverse;
                gap: 40px;
                padding-bottom: 30px;
            }
            .form-title {
                font-size: 32px;
            }
            .banner-text {
                font-size: 30px;
            }
            .top-left-box {
                font-size: 18px;
                padding: 12px 28px;
            }
            .image-side img {
                max-width: 420px;
            }
        }
        @media (max-width: 600px) {
            .page-wrapper {
                padding: 18px;
            }
            .form-title {
                font-size: 24px;
            }
            .banner-text {
                font-size: 24px;
            }
            .sub-text {
                font-size: 15px;
            }
            .input-box {
                font-size: 16px;
                padding: 14px;
            }
            .btn-continue,
            .btn-submit {
                font-size: 18px;
            }
        }
    </style>
</head>
<body>

    <div class="page-wrapper">
        <div class="top-left-box">FORGET PASSWORD</div>

        <div class="main-section">
            <div class="form-side">
                <div class="purple-banner">
                    <h1 class="banner-text">HI! STAYS FINDER</h1>
                </div>

                <h2 class="form-title">FORGET & CHANGING PASSWORD</h2>
                <p class="sub-text">IF FORGET PASSWORD THEN FIND YOUR ACCOUNT</p>

                <form class="forget-form">
                    <input type="text" class="input-box" placeholder="ENTER MOBILE NUMBER">
                    <div class="or-text">OR</div>
                    <input type="email" class="input-box" placeholder="ENTER YOUR EMAIL">
                    <button type="button" class="btn-continue">CONTINUE</button>

                    <input type="text" class="input-box" placeholder="GET CODE VIA MESSAGE">
                    <button type="button" class="btn-continue">CONTINUE</button>

                    <input type="password" class="input-box" placeholder="CHANGE PASSWORD">
                    <button type="submit" class="btn-submit">SUBMIT</button>
                </form>
            </div>

            <div class="image-side">
                <img src="{% static 'images/home.png' %}" alt="StayFinder Image">
            </div>
        </div>
    </div>

</body>
</html>
