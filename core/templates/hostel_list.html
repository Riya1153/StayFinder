<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>House & Hostel List - StayFinder</title>
    <style>
        body {
            background-color: #FFDADA; /* Exact Figma Peach */
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .main-container {
            width: 360px; /* Exact mobile-view width */
            background-color: white;
            border-radius: 25px;
            padding: 20px;
            box-shadow: 0px 4px 15px rgba(0,0,0,0.1);
        }
        .header-section {
            background-color: #D9D9D9;
            padding: 10px;
            text-align: center;
            font-weight: bold;
            font-size: 14px;
            border-radius: 5px;
            margin-bottom: 15px;
        }
        .filter-buttons {
            display: flex;
            gap: 5px;
            margin-bottom: 20px;
        }
        .filter-btn {
            flex: 1;
            background-color: white;
            border: 1px solid #B5B5B5;
            padding: 5px 2px;
            border-radius: 5px;
            font-size: 9px;
            font-weight: bold;
            cursor: pointer;
        }
        .rent-title {
            background-color: #D9D9D9;
            padding: 8px;
            text-align: center;
            font-weight: bold;
            font-size: 13px;
            border-radius: 5px;
            margin-bottom: 15px;
        }
        /* Grid Layout like Figma */
        .property-grid {
            display: grid;
            grid-template-columns: 1fr 1fr; /* 2 items per row */
            gap: 15px;
        }
        .card {
            background: #fff;
            border: 1px solid #E0E0E0;
            border-radius: 12px;
            padding: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .img-box {
            width: 100%;
            height: 80px;
            background-color: #D9D9D9;
            border-radius: 8px;
            margin-bottom: 8px;
        }
        .name {
            font-size: 10px;
            font-weight: bold;
            margin-bottom: 3px;
            text-transform: uppercase;
        }
        .info {
            font-size: 8px;
            font-weight: bold;
            color: #333;
            margin-bottom: 8px;
            text-align: center;
        }
        .price-red {
            color: #FF0000;
        }
        .details-btn {
            background-color: #B2B2FF; /* Figma Light Purple */
            border: none;
            padding: 5px;
            width: 100%;
            border-radius: 5px;
            font-weight: bold;
            font-size: 9px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="header-section">RENT FOR</div>

        <div class="filter-buttons">
            <button class="filter-btn">HOUSE LIST</button>
            <button class="filter-btn">BOYS'S HOSTEL LIST</button>
            <button class="filter-btn">GIRL'S HOSTEL LIST</button>
        </div>

        <div class="rent-title">HOUSE RENT</div>

        <div class="property-grid">
            <div class="card">
                <div class="img-box"></div>
                <div class="name">MOONSCAPE</div>
                <div class="info price-red">CALL FOR PRICE</div>
                <button class="details-btn">DETAILS</button>
            </div>

            <div class="card">
                <div class="img-box"></div>
                <div class="name">ARKAM KPLOTAN</div>
                <div class="info price-red">CALL FOR PRICE</div>
                <button class="details-btn">DETAILS</button>
            </div>

            <div class="card">
                <div class="img-box"></div>
                <div class="name">Nagar Chayaneer</div>
                <div class="info">Owner: Arafat Dev.</div>
                <button class="details-btn">DETAILS</button>
            </div>

            <div class="card">
                <div class="img-box"></div>
                <div class="name">ARKAM BUILDERS</div>
                <div class="info">Price: 2350</div>
                <button class="details-btn">DETAILS</button>
            </div>
        </div>
    </div>

</body>
</html>
