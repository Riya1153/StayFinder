<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>House & Hostel List - StayFinder</title>
    <style>
        body {
            background-color: #FFDADA; /* Figma Peach background */
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 40px;
            color: #000;
        }

        .gray-header {
            background-color: #D9D9D9;
            padding: 5px 15px;
            display: inline-block;
            font-weight: bold;
            font-size: 13px;
            text-transform: uppercase;
            margin-bottom: 25px;
            border-radius: 2px;
        }

        .property-row {
            display: flex;
            gap: 20px;
            justify-content: flex-start;
            margin-left: 10px;
            margin-bottom: 50px;
            flex-wrap: wrap;
        }

        .card {
            width: 180px;
            background: #fff;
            border-radius: 20px;
            padding: 12px;
            text-align: center;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.1);
            transition: transform 0.2s;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .property-img {
            width: 100%;
            height: 120px;
            border-radius: 15px;
            margin-bottom: 10px;
            object-fit: cover;
        }

        .card-title {
            font-size: 12px;
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: 12px;
            min-height: 30px; /* Keeps buttons aligned */
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .details-btn {
            background-color: #D9D9D9;
            color: black;
            padding: 8px 0;
            width: 100%;
            border-radius: 8px;
            font-weight: bold;
            font-size: 11px;
            text-transform: uppercase;
            text-decoration: none;
            display: inline-block;
            transition: background 0.3s;
        }

        .details-btn:hover {
            background-color: #c0c0c0;
        }
    </style>
</head>
<body>

    {% load static %}

    <!-- HOUSE RENT SECTION -->
    <div class="gray-header">HOUSE RENT</div>

    <div class="property-row">
        {% for house in houses %}
        <div class="card">
            {% if house.image %}
                <img src="{{ house.image.url }}" alt="{{ house.title }}" class="property-img">
            {% else %}
                <img src="{% static 'images/default_house.png' %}" alt="Default" class="property-img">
            {% endif %}

            <div class="card-title">{{ house.title|upper }}</div>

            <a href="{% url 'property_details' house.id %}" class="details-btn">DETAILS</a>
        </div>
        {% empty %}
            <p style="margin-left: 20px;">No houses available at the moment.</p>
        {% endfor %}
    </div>




</body>
</html>
