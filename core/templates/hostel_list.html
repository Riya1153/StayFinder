<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>House & Hostel List - StayFinder</title>
    <style>
        body {
            background-color: #FFDADA; /* Figma Peach background */
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 40px; /* Padding for entire page like Figma */
            color: #000;
        }

        /* Gray rectangular header background */
        .gray-header {
            background-color: #D9D9D9;
            padding: 5px 10px;
            display: inline-block;
            font-weight: bold;
            font-size: 13px;
            text-transform: uppercase;
            margin-bottom: 25px; /* Space before main lists */
        }

        /* Main lists container */
        .list-container {
            text-align: left; /* Strict Left Alignment for all text */
            margin-bottom: 40px;
            margin-left: 10px; /* Aligns with gray header corner */
        }

        .main-title {
            font-size: 20px;
            font-weight: bold;
            text-transform: uppercase;
            margin-top: 0;
            margin-bottom: 5px; /* Tight spacing between items */
        }

        .sub-title {
            font-size: 18px;
            font-weight: bold;
            text-transform: uppercase;
            margin-top: 0;
            margin-bottom: 5px;
        }

        /* Grid for properties */
        .property-row {
            display: flex; /* Flexbox for horizontal layout */
            gap: 20px; /* Spacing between cards */
            justify-content: flex-start; /* Aligns row to the left */
            margin-left: 10px; /* Aligns row with text lists */
        }

        .card {
            width: 180px; /* Fixed width for cards like Figma */
            background: #fff;
            border-radius: 20px;
            padding: 10px;
            text-align: center;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.1);
        }

        .img-placeholder {
            width: 100%;
            height: 120px; /* Image placeholder height */
            background-color: #D9D9D9; /* Default gray for now */
            border-radius: 15px;
            margin-bottom: 8px;
        }

        .card-title {
            font-size: 11px;
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .details-btn {
            background-color: #D9D9D9; /* Figma light gray button */
            border: none;
            padding: 8px;
            width: 60%; /* Smaller button like Figma */
            border-radius: 5px;
            font-weight: bold;
            font-size: 10px;
            text-transform: uppercase;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="gray-header">RENT FOR</div>

    <div class="list-container">
        <h1 class="main-title">HOUSE LIST</h1>
        <h2 class="sub-title">BOYS'S HOSTEL LIST</h2>
        <h2 class="sub-title">GIRL'S HOSTEL LIST</h2>
    </div>

    <div class="gray-header">HOUSE RENT</div>

    <div class="property-row">
        <div class="card">
            <div class="img-placeholder"></div>
            <div class="card-title">MOONSCAPE</div>
            <button class="details-btn">DETAILS</button>
        </div>

        <div class="card">
            <div class="img-placeholder"></div>
            <div class="card-title">ARKAM KPLOTAN</div>
            <button class="details-btn">DETAILS</button>
        </div>

        <div class="card">
            <div class="img-placeholder"></div>
            <div class="card-title">Nagar Chayaneer</div>
            <button class="details-btn">DETAILS</button>
        </div>
    </div>

</body>
</html>
