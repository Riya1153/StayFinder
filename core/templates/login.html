<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StayFinder - Log In</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Times New Roman', serif; }

        body {
            background-color: #FFF5F5;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* Top Left Header (Gray Box) */
        .top-left-box {
            align-self: flex-start;
            margin: 20px 0 0 30px;
            background: #D9D9D9;
            padding: 10px 60px;
            border: 1px solid #ccc;
            font-weight: bold;
            font-size: 18px;
        }

        /* Center Content */
        .main-container {
            margin-top: 100px;
            text-align: center;
            width: 400px;
        }

        .title-text {
            font-size: 18px;
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: 50px;
        }

        /* Form Styling */
        .login-form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* FIXED INPUT BOX COLOR AND STYLE */
        .input-box {
            background-color: #D9D9D9;
            border: none;
            padding: 15px;
            width: 100%;
            text-align: center;
            font-size: 14px;
            text-transform: uppercase;
            font-weight: bold;
            color: #444;
        }

        .input-box:focus {
            background-color: #D9D9D9;
            outline: none;
        }

        /* Submit Button (Turquoise Color) */
        .btn-container {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            margin-top: 10px;
        }

        .login-btn {
            background-color: #79E0D6;
            border: none;
            padding: 10px 30px;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.1);
            color: black;
            text-decoration: none;
        }

        .forget-link {
            font-size: 10px;
            text-transform: uppercase;
            color: #000;
            text-decoration: none;
            margin-top: 10px;
        }

        .forget-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="top-left-box">LOG IN PAGE</div>

    <div class="main-container">
        <h2 class="title-text">IF YOU'VE AN ACCOUNT ALREADY</h2>

        <form class="login-form" action="{% url 'dashboard' %}" method="POST">
            {% csrf_token %}
            <input type="email" name="email" class="input-box" placeholder="ENTER YOUR EMAIL" required>
            <input type="password" name="password" class="input-box" placeholder="PASSWORD" required>

            <div class="btn-container">
                <button type="submit" class="login-btn">LOG IN</button>
                <a href="{% url 'forget_password' %}" class="forget-link">FORGET PASSWORD</a>
            </div>
        </form>
    </div>

</body>
</html>
