<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StayFinder - Log In</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Times New Roman', serif;
        }

        body {
            background-color: #F6EDED;
            height: 100vh;
        }

        .wrapper {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .main-container {
            width: 650px;
            text-align: center;
        }

        .title-text {
            font-size: 36px;
            font-weight: bold;
            margin-bottom: 70px;
            text-transform: uppercase;
        }

        .input-box {
            width: 100%;
            padding: 22px;
            margin-bottom: 25px;
            font-size: 18px;
            text-align: center;
            font-weight: bold;
            border: 2px solid #000;
            background-color: #C9D1DC;
        }

        .shadow {
            box-shadow: 6px 6px 0px #000;
        }

        .btn-area {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
        }

        .login-btn {
            background-color: #6FDAD0;
            border: 2px solid #000;
            padding: 14px 50px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 6px 6px 0px #000;
        }

        .forget-link {
            margin-top: 10px;
            font-size: 13px;
            text-decoration: none;
            color: #000;
        }
    </style>
</head>

<body>

<div class="wrapper">
    <div class="main-container">

        <h2 class="title-text">IF YOU'VE AN ACCOUNT ALREADY</h2>

        <form action="{% url 'dashboard' %}" method="POST">
            {% csrf_token %}

            <input type="email" name="email" class="input-box" placeholder="ENTER YOUR EMAIL" required>

            <input type="password" name="password" class="input-box shadow" placeholder="PASSWORD" required>

            <div class="btn-area">
                <button type="submit" class="login-btn">LOG IN</button>
                <a href="{% url 'password_reset' %}" class="forget-link">FORGET PASSWORD</a>
            </div>
        </form>

    </div>
</div>

</body>
</html>
