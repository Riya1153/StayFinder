<!DOCTYPE html>
{% load static %}
<html>
<head>
<title>New Password</title>
<style>
body{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:#f5f7fb;
font-family:sans-serif;
}
.card{
background:white;
padding:40px;
border-radius:15px;
width:350px;
text-align:center;
}
input{
width:100%;
padding:10px;
margin:10px 0;
border-radius:8px;
border:1px solid #ccc;
}
button{
width:100%;
padding:10px;
background:#4f46e5;
color:white;
border:none;
border-radius:8px;
}
</style>
</head>
<body>

<div class="card">
<h2>🔑 Set New Password</h2>

<form method="post">
{% csrf_token %}
{{ form.as_p }}
<button type="submit">Change Password</button>
</form>

</div>

</body>
</html>
