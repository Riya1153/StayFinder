<!DOCTYPE html>
<html>
<head>
    <title>Payment Feedback</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            background: #ffdede;
            font-family: Arial, sans-serif;
        }

        .container {
            width: 560px;
            margin: 25px auto;
        }

        h3 {
            margin-bottom: 10px;
            font-size: 18px;
            font-weight: bold;
            color: black;
            text-transform: uppercase;
        }

        .payment-buttons {
            display: flex;
            gap: 8px;
            margin-bottom: 22px;
        }

        .pay-btn {
            width: 170px;
            height: 42px;
            border: 1px solid #999;
            background: #ddd;
            font-weight: bold;
            cursor: pointer;
            letter-spacing: 1px;
        }

        .pay-btn.active {
            background: #0867bd;
            color: white;
        }

        .rating-box {
            width: 100%;
            height: 58px;
            border: 1px solid #999;
            background: #ddd;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 22px;
        }

        .star {
            font-size: 24px;
            color: #666;
            cursor: pointer;
            margin: 0 4px;
        }

        .star.active {
            color: #ff9900;
        }

        textarea {
            width: 100%;
            height: 90px;
            border: 1px solid #bbb;
            border-radius: 6px;
            padding: 13px;
            font-size: 14px;
            box-sizing: border-box;
            resize: none;
            background: white;
        }

        .submit-btn {
            width: 100%;
            height: 42px;
            background: orange;
            color: white;
            border: none;
            border-radius: 6px;
            margin-top: 16px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
        }

        .submit-btn:hover {
            background: #e69500;
        }
    </style>
</head>

<body>

<div class="container">

    <form method="POST" action="{% url 'payment_feedback' %}" onsubmit="return checkForm()">
        {% csrf_token %}

        <h3>PAY METHOD</h3>

        <div class="payment-buttons">
            <button type="button" class="pay-btn" onclick="selectPayment('Cash', this)">CASH</button>
            <button type="button" class="pay-btn active" onclick="selectPayment('Bkash', this)">BKASH</button>
            <button type="button" class="pay-btn" onclick="selectPayment('ATM', this)">ATM</button>
        </div>

        <input type="hidden" name="payment_method" id="payment_method" value="Bkash">

        <h3>PAGE REVIEW, RATINGS</h3>

        <div class="rating-box">
            <span class="star" onclick="selectRating(1)">★</span>
            <span class="star" onclick="selectRating(2)">★</span>
            <span class="star" onclick="selectRating(3)">★</span>
            <span class="star" onclick="selectRating(4)">★</span>
            <span class="star" onclick="selectRating(5)">★</span>
        </div>

        <input type="hidden" name="rating" id="rating" value="">

        <h3>COMPLAINT BOX</h3>

        <textarea name="complaint" placeholder="Write your complaint here.."></textarea>

        <button type="submit" class="submit-btn">SUBMIT FEEDBACK</button>

    </form>

</div>

<script>
    function selectPayment(method, button) {
        document.getElementById("payment_method").value = method;

        let buttons = document.querySelectorAll(".pay-btn");
        buttons.forEach(btn => btn.classList.remove("active"));

        button.classList.add("active");
    }

    function selectRating(value) {
        document.getElementById("rating").value = value + " Star";

        let stars = document.querySelectorAll(".star");
        stars.forEach((star, index) => {
            if (index < value) {
                star.classList.add("active");
            } else {
                star.classList.remove("active");
            }
        });
    }

    function checkForm() {
        let rating = document.getElementById("rating").value;

        if (rating === "") {
            alert("Please select rating");
            return false;
        }

        return true;
    }
</script>

</body>
</html>
