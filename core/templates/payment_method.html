{% load static %}
<DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Payment Method - StayFinder</title>
    <style>
        body { background-color: #FFDADA; font-family: 'Inter', sans-serif; margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: 50px auto; text-align: left; }
        .section-label { font-weight: bold; font-size: 20px; margin-bottom: 10px; text-transform: uppercase; }

        /* Payment Selection Styling */
        .payment-options { display: flex; gap: 10px; margin-bottom: 30px; }
        .payment-options label {
            flex: 1;
            background: #D9D9D9;
            padding: 15px;
            text-align: center;
            font-weight: bold;
            cursor: pointer;
            border: 2px solid #999;
            border-radius: 4px;
            transition: 0.3s;
        }
        .payment-options input[type="radio"] { display: none; }
        .payment-options input[type="radio"]:checked + label {
            background: #005BB7;
            color: white;
            border-color: #003d7a;
        }

        /* Star Rating Styling */
        .rating-box {
            background: #D9D9D9;
            padding: 20px;
            text-align: center;
            border-radius: 4px;
            margin-bottom: 30px;
            border: 1px solid #999;
        }
        .star-rating { display: flex; flex-direction: row-reverse; justify-content: center; gap: 5px; }
        .star-rating input { display: none; }
        .star-rating label {
            font-size: 30px;
            color: #777;
            cursor: pointer;
            transition: 0.2s;
        }
        .star-rating label:hover,
        .star-rating label:hover ~ label,
        .star-rating input:checked ~ label { color: #f39c12; }

        .complaint-box {
            width: 100%;
            height: 120px;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #ccc;
            background: white;
            font-size: 16px;
            resize: none;
            box-sizing: border-box;
        }

        .submit-btn {
            background: orange;
            border: none;
            color: white;
            padding: 15px;
            font-weight: bold;
            font-size: 18px;
            cursor: pointer;
            border-radius: 8px;
            width: 100%;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div class="container">
        <form method="POST">
            {% csrf_token %}

            <div class="section-label">PAY METHOD</div>
            <div class="payment-options">
                <input type="radio" name="pay_method" id="cash" value="cash" required>
                <label for="cash">CASH</label>

                <input type="radio" name="pay_method" id="bkash" value="bkash" onclick="window.location.href='{% url 'bkash_payment' %}'">
                <label for="bkash">BKASH</label>

                <input type="radio" name="pay_method" id="atm" value="atm" onclick="window.location.href='{% url 'atm_payment' %}'">
                <label for="atm">ATM</label>
            </div>

            <div class="section-label">PAGE REVIEW, RATINGS</div>
            <div class="rating-box">
                <div class="star-rating">
                    <input type="radio" name="rating" id="star5" value="5"><label for="star5">★</label>
                    <input type="radio" name="rating" id="star4" value="4"><label for="star4">★</label>
                    <input type="radio" name="rating" id="star3" value="3"><label for="star3">★</label>
                    <input type="radio" name="rating" id="star2" value="2"><label for="star2">★</label>
                    <input type="radio" name="rating" id="star1" value="1"><label for="star1">★</label>
                </div>
            </div>

            <div class="section-label">COMPLAINT BOX</div>
            <textarea class="complaint-box" name="complaint" placeholder="Write your complaint here..."></textarea>

            <button type="submit" class="submit-btn">SUBMIT FEEDBACK</button>
        </form>
    </div>

</body>
</html>
