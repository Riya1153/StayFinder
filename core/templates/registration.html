<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StayFinder - Sign Up</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Times New Roman', serif;
}

body{
    background:#f6f1f1;
    min-height:100vh;
}

/* TOP LEFT */
.top-left-box{
    position:absolute;
    top:20px;
    left:30px;
    background:#d9d9d9;
    padding:12px 35px;
    font-weight:bold;
    font-size:16px;
}

/* MAIN CENTER */
.main{
    width:100%;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}

/* BANNER */
.purple-banner{
    background:#6a1b9a;
    width:650px;
    padding:18px;
    text-align:center;
    margin-bottom:40px;
}

.banner-text{
    color:#cddc39;
    font-size:28px;
    font-weight:bold;
}

/* TITLE */
.form-title{
    font-size:34px;
    font-weight:bold;
    margin-bottom:35px;
    text-align:center;
}

/* FORM */
.signup-form{
    width:420px;
    display:flex;
    flex-direction:column;
    gap:20px;
}

/* INPUT GROUP */
.input-group{
    display:flex;
    flex-direction:column;
}

.input-group label{
    font-weight:bold;
    font-size:16px;
    margin-bottom:8px;
}

.input-group input{
    background:#d9d9d9;
    border:none;
    height:55px;
    padding:12px;
    font-size:16px;
}

/* BUTTON */
.submit-btn{
    background:#b39ddb;
    border:none;
    height:55px;
    font-weight:bold;
    font-size:18px;
    margin-top:20px;
    cursor:pointer;
    transition:0.3s;
}

.submit-btn:hover{
    background:#9575cd;
    transform:scale(1.02);
}

/* LOGIN TEXT */
.login-link{
    margin-top:30px;
    font-size:16px;
}

.login-link a{
    color:#6a1b9a;
    font-weight:bold;
}

/* RESPONSIVE */
@media(max-width:700px){
    .purple-banner{
        width:90%;
    }

    .signup-form{
        width:90%;
    }
}
</style>

</head>

<body>

<div class="top-left-box">SIGN UP A NEW ACCOUNT</div>

<div class="main">

<div class="purple-banner">
    <h1 class="banner-text">HI! STAYS FINDER</h1>
</div>

<h2 class="form-title">SIGN UP OR CREATE AN ACCOUNT</h2>

<form class="signup-form" action="{% url 'registration' %}" method="POST">
    {% csrf_token %}

    <div class="input-group">
        <label>Name</label>
        <input type="text" name="name" required>
    </div>

    <div class="input-group">
        <label>Gender</label>
        <input type="text" name="gender">
    </div>

    <div class="input-group">
        <label>Phone Number</label>
        <input type="text" name="phone">
    </div>

    <div class="input-group">
        <label>Email address</label>
        <input type="email" name="email" required>
    </div>

    <div class="input-group">
        <label>Password</label>
        <input type="password" name="password" required>
    </div>

    <button type="submit" class="submit-btn">SUBMIT</button>

</form>

<p class="login-link">
    Already have an account? <a href="{% url 'login' %}">Log In</a>
</p>

</div>

</body>
</html>
