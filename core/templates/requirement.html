{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tell Us Your Requirement - StayFinder</title>
    <style>
        body {
            background-color: #FFDADA;
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 500px;
            text-align: center;
        }

        .header-box {
            background: #D9D9D9;
            color: #333;
            padding: 15px;
            font-weight: bold;
            font-size: 20px;
            margin-bottom: 30px;
            border-radius: 5px;
            text-transform: uppercase;
        }

        .form-group { text-align: left; margin-bottom: 20px; }
        .form-group label { display: block; font-weight: bold; margin-bottom: 8px; color: #444; }
        .form-group label span { color: red; }

        .form-group input, .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 16px;
            box-sizing: border-box;
            font-family: inherit;
        }

        .form-group textarea { height: 100px; resize: vertical; }

        /* Button Container */
        .button-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 25px;
        }

        /* Primary Submit Button */
        .submit-btn {
            background: #005BB7;
            color: white;
            border: none;
            padding: 15px;
            font-weight: bold;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            transition: 0.3s;
            text-transform: uppercase;
        }
        .submit-btn:hover { background: #00448a; transform: translateY(-2px); }

        /* Payment Process Button */
        .payment-btn {
            background: #28a745; /* Success Green */
            color: white;
            border: none;
            padding: 15px;
            font-weight: bold;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            transition: 0.3s;
            text-transform: uppercase;
            display: inline-block;
            text-decoration: none;
        }
        .payment-btn:hover {
            background: #218838;
            transform: translateY(-2px);
            box-shadow: 0 4px 10px rgba(40, 167, 69, 0.3);
        }

        a { text-decoration: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-box">For Receiving Requirement Alert</div>

    <form method="POST">
        {% csrf_token %}

        <div class="form-group">
            <label>Name <span>*</span></label>
            <input type="text" name="name" placeholder="Enter Your Name" required>
        </div>

        <div class="form-group">
            <label>E-mail <span>*</span></label>
            <input type="email" name="email" placeholder="Enter your Email" required>
        </div>

        <div class="form-group">
            <label>Mobile No <span>*</span></label>
            <input type="text" name="mobile" placeholder="+880 1XXXXXXXXX" required>
        </div>

        <div class="form-group">
            <label>Tell Us Your Requirement <span>*</span></label>
            <textarea name="requirement" placeholder="Describe what kind of stay you are looking for..." required></textarea>
        </div>

        <div class="button-group">
            <button type="submit" class="submit-btn">SUBMIT</button>

            <a href="{% url 'payment_process' %}">
                <button type="button" class="payment-btn">MOVE TO PAYMENT PROCESS</button>
            </a>
        </div>
    </form>
</div>

</body>
</html>
