{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StayFinder | Search</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            /* Using your mountain sunset image with a slight dark overlay for readability */
            background-image: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)),
                              url("{% static 'images/stayfinder_mountain_sunset.png' %}");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Top Navigation Bar */
        header {
            width: 100%;
            padding: 20px 60px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 26px;
            font-weight: 700;
            color: white;
            text-decoration: none;
        }

        .logo-icon {
            background: #ff5a5f;
            padding: 5px 8px;
            border-radius: 8px;
        }

        .logout-btn {
            background: white;
            color: #333;
            text-decoration: none;
            padding: 10px 22px;
            border-radius: 12px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        /* Center Search Section */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding-bottom: 100px; /* Moves search slightly above absolute center */
        }

        h1 {
            color: white;
            font-size: 64px;
            font-weight: 700;
            margin-bottom: 10px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }

        p {
            color: white;
            font-size: 20px;
            margin-bottom: 40px;
            opacity: 0.9;
        }

        /* Google-style Search Bar */
        .search-wrapper {
            width: 100%;
            max-width: 600px;
            background: white;
            padding: 12px 25px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .search-wrapper input {
            flex: 1;
            border: none;
            outline: none;
            font-size: 16px;
            color: #333;
            padding-left: 10px;
        }

        .search-icon-grey {
            fill: #888;
            width: 20px;
            height: 20px;
        }

        .orange-search-circle {
            background: #e67e22;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: none;
            transition: 0.2s;
        }

        .orange-search-circle:hover {
            transform: scale(1.05);
            background: #d35400;
        }

        .icon-white {
            fill: white;
            width: 22px;
            height: 22px;
        }
    </style>
</head>
<body>

    <header>
        <a href="/" class="logo">
            <span class="logo-icon">🏠</span>
            <span>StayFinder</span>
        </a>

        <a href="/logout" class="logout-btn">
            <svg style="width:18px;height:18px" viewBox="0 0 24 24"><path fill="currentColor" d="M16,17V14H9V10H16V7L21,12L16,17M14,2A2,2 0 0,1 16,4V9H14V4H5V20H14V15H16V20A2,2 0 0,1 14,22H5A2,2 0 0,1 3,20V4A2,2 0 0,1 5,2H14Z" /></svg>
            Log Out
        </a>
    </header>

    <main>
        <h1>Find Your Perfect Stay</h1>
        <p>Search. Book. Relax.</p>

        <div class="search-wrapper">
            <svg class="search-icon-grey" viewBox="0 0 24 24"><path d="M9.5,3A6.5,6.5 0 0,1 16,9.5C16,11.11 15.41,12.59 14.44,13.73L14.71,14H15.5L20.5,19L19,20.5L14,15.5V14.71L13.73,14.44C12.59,15.41 11.11,16 9.5,16A6.5,6.5 0 0,1 3,9.5A6.5,6.5 0 0,1 9.5,3M9.5,5C7,5 5,7 5,9.5C5,12 7,14 9.5,14C12,14 14,12 14,9.5C14,7 12,5 9.5,5Z" /></svg>

            <input type="text" placeholder="Search hostel,house....">

            <button class="orange-search-circle">
                <svg class="icon-white" viewBox="0 0 24 24"><path d="M9.5,3A6.5,6.5 0 0,1 16,9.5C16,11.11 15.41,12.59 14.44,13.73L14.71,14H15.5L20.5,19L19,20.5L14,15.5V14.71L13.73,14.44C12.59,15.41 11.11,16 9.5,16A6.5,6.5 0 0,1 3,9.5A6.5,6.5 0 0,1 9.5,3M9.5,5C7,5 5,7 5,9.5C5,12 7,14 9.5,14C12,14 14,12 14,9.5C14,7 12,5 9.5,5Z" /></svg>
            </button>
        </div>
    </main>

</body>
</html>
